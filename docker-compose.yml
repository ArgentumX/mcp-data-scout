services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: data-scout-backend
    ports:
      - "8000:8000"
    volumes:
      - data_volume:/data
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: data-scout-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data_volume:
