version: "3.9"

services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: data-scout-mcp
    ports:
      - "8000:8000"
    volumes:
      - data_volume:/data
    environment:
      SQLITE_DB_PATH: /data/sqlite/sample.db
      CSV_DIR: /data/csv
      INDEX_DB_PATH: /data/index.db
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: data-scout-ui
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://mcp:8000
    depends_on:
      mcp:
        condition: service_healthy

volumes:
  data_volume:
