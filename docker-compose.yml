services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: data-scout-mcp
    ports:
      - "8000:8000"
    volumes:
      - data_volume:/data
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: data-scout-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      mcp:
        condition: service_healthy

volumes:
  data_volume:
